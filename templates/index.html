<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikipedia Word Cloud Toolkit</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard Variable', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            padding: 1rem 2.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-container {
            margin-top: 2rem;
            display: none;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #818cf8;
        }

        #wordcloud-img {
            max-width: 100%;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
        }

        .wiki-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .wiki-link:hover {
            color: var(--primary);
        }

        .loader {
            display: none;
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--primary);
            border-radius: 50%;
            margin: 2rem auto;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-msg {
            color: #ef4444;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wiki Cloud</h1>
        <p class="subtitle">위키백과 상위 검색 결과를 워드클라우드로 시각화합니다.</p>
        
        <div class="search-wrapper">
            <input type="text" id="keyword" placeholder="궁금한 키워드를 입력하세요 (예: 파이썬, 우주, 한국)" onkeypress="if(event.keyCode==13) generateCloud()">
            <button id="generate-btn" onclick="generateCloud()">생성하기</button>
        </div>

        <div id="loader" class="loader"></div>
        <div id="error-msg" class="error-msg"></div>

        <div id="result" class="result-container">
            <h2 id="result-title" class="result-title"></h2>
            <img id="wordcloud-img" src="" alt="Word Cloud">
            <br>
            <a id="wiki-url" class="wiki-link" target="_blank">위키백과에서 원문 읽기 →</a>
        </div>
    </div>

    <script>
        async function generateCloud() {
            const keywordInput = document.getElementById('keyword');
            const keyword = keywordInput.value.trim();
            const btn = document.getElementById('generate-btn');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');
            const errorMsg = document.getElementById('error-msg');

            if (!keyword) return;

            // UI 초기화
            btn.disabled = true;
            loader.style.display = 'block';
            result.style.display = 'none';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: keyword })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('result-title').textContent = data.title;
                    document.getElementById('wordcloud-img').src = 'data:image/png;base64,' + data.image;
                    document.getElementById('wiki-url').href = data.url;
                    result.style.display = 'block';
                } else {
                    errorMsg.textContent = data.error || '오류가 발생했습니다.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = '서버와 통신하는 중 오류가 발생했습니다.';
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
